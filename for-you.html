<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You — Wanderlust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/cards.css">
  <link rel="stylesheet" href="styles/navbar.css">
  <link rel="stylesheet" href="styles/tabs.css">
  <link rel="stylesheet" href="styles/for-you.css">
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="nav-brand">Wanderlust</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="vacations.html">Vacations</a>
      <a href="hotels.html">Hotels</a>
      <a href="resorts.html">Resorts</a>
      <a href="dining.html">Dining</a>
    </div>
    <div id="signin-mount" class="nav-signin-slot"></div>
  </nav>

  <header class="hero">
    <h1>For You</h1>
    <p id="for-you-reason">Explore picks by theme.</p>
  </header>

  <main class="main-content">
    <div id="tab-bar" class="tab-bar"></div>
    <div id="destination-grid" class="destination-grid"></div>
  </main>

  <script src="lib/dist/intent-tracker.js"></script>
  <script>
    const tracker = IntentTracker.create({
      root: document.getElementById('destination-grid'),
      debug: true,
      pageMeta: { name: 'For You', category: 'for-you', url: '/for-you.html' },
      emit: '/api/ingest',
    });
    window.__intentTracker = tracker;
  </script>
  <script type="module">
    import { mountSigninControl } from './js/ui/signin-control.js';
    const mountEl = document.getElementById('signin-mount');
    if (mountEl) mountSigninControl(mountEl);
  </script>
  <script type="module" src="js/ui/for-you-page.js"></script>
</body>
</html>
