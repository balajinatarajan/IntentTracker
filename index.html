<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wanderlust — Discover Your Next Adventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/cards.css">
  <link rel="stylesheet" href="styles/modal.css">
  <link rel="stylesheet" href="styles/recommendations.css">
  <link rel="stylesheet" href="styles/debug-panel.css">
  <link rel="stylesheet" href="styles/navbar.css">
  <link rel="stylesheet" href="styles/tabbed-grid.css">
  <link rel="stylesheet" href="styles/for-you-search.css">
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="nav-brand">Wanderlust</a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="vacations.html">Vacations</a>
      <a href="hotels.html">Hotels</a>
      <a href="resorts.html">Resorts</a>
      <a href="dining.html">Dining</a>
    </div>
    <div id="signin-mount" class="nav-signin-slot"></div>
  </nav>

  <!-- Hero Section with Search -->
  <header class="hero">
    <h1>Where will you go next?</h1>
    <p>Explore destinations around the world</p>
    <div class="search-container">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search destinations, regions, or trip types..." autocomplete="off">
    </div>
    <a href="for-you-search.html" class="hero-foryou-link">
      Plan a trip with For You →
    </a>
  </header>

  <div id="tab-bar" class="tab-bar"></div>
  <div id="continue-search-section" hidden></div>

  <!-- Main Content -->
  <main class="main-content">
    <div id="destination-grid" class="destination-grid"></div>
  </main>

  <!-- Detail Modal -->
  <div id="detail-modal" class="modal-overlay">
    <div class="modal-content"></div>
  </div>

  <!-- Feature 1: app2.js + tabbed-grid replaces app.js. app.js retained on disk, no longer loaded. Static debug-panel removed; dist's __ik-panel is now sole debug UI. -->
  <script src="lib/dist/intent-tracker.js"></script>
  <script type="module" src="js/app2.js"></script>
  <script type="module">
    import { mountSigninControl } from './js/ui/signin-control.js';
    const mountEl = document.getElementById('signin-mount');
    if (mountEl) mountSigninControl(mountEl);
  </script>
</body>
</html>
