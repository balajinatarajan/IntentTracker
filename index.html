<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wanderlust — Discover Your Next Adventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/cards.css">
  <link rel="stylesheet" href="styles/modal.css">
  <link rel="stylesheet" href="styles/recommendations.css">
  <link rel="stylesheet" href="styles/debug-panel.css">
</head>
<body>

  <!-- Hero Section with Search -->
  <header class="hero">
    <h1>Where will you go next?</h1>
    <p>Explore destinations around the world</p>
    <div class="search-container">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search destinations, regions, or trip types..." autocomplete="off">
    </div>
  </header>

  <!-- Recommendations Section (hidden for first-time visitors) -->
  <section id="recommendations-section" class="recommendations-section" style="display: none;">
  </section>

  <!-- Main Content -->
  <main class="main-content">
    <h2 class="section-title">Popular Destinations</h2>
    <div id="destination-grid" class="destination-grid"></div>
  </main>

  <!-- Detail Modal -->
  <div id="detail-modal" class="modal-overlay">
    <div class="modal-content"></div>
  </div>

  <!-- Debug Panel -->
  <div id="debug-panel" class="debug-panel">
    <div class="debug-panel-header">
      <span class="debug-panel-title">Intent Tracker</span>
      <button id="debug-panel-close" class="debug-panel-toggle">&times;</button>
    </div>
    <div class="debug-tabs">
      <button class="debug-tab active" data-tab="events">Events</button>
      <button class="debug-tab" data-tab="intents">Intents</button>
      <button class="debug-tab" data-tab="profile">Profile</button>
      <button class="debug-tab" data-tab="recs">Recs</button>
    </div>
    <div class="debug-tab-content" id="debug-tab-content">
      <div class="debug-empty">Interact with the page to see events...</div>
    </div>
    <div class="debug-footer">
      <button id="debug-clear-btn" class="debug-clear-btn">Clear All Data</button>
    </div>
  </div>
  <button id="debug-panel-fab" class="debug-fab" title="Open Intent Tracker">
    <span>&#9881;</span>
  </button>

  <script type="module" src="js/app.js"></script>
</body>
</html>
