<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wanderlust — Discover Your Next Adventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/cards.css">
  <link rel="stylesheet" href="styles/modal.css">
  <link rel="stylesheet" href="styles/recommendations.css">
  <link rel="stylesheet" href="styles/tabs.css">
  <link rel="stylesheet" href="styles/navbar.css">
  <link rel="stylesheet" href="styles/for-you.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <a href="index.html" class="nav-brand">Wanderlust</a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="vacations.html">Vacations</a>
      <a href="hotels.html">Hotels</a>
      <a href="resorts.html">Resorts</a>
      <a href="dining.html">Dining</a>
    </div>
  </nav>

  <!-- Hero Section with Search -->
  <header class="hero">
    <h1>Where will you go next?</h1>
    <p>Explore destinations around the world</p>
    <div class="search-container">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search destinations, regions, or trip types..." autocomplete="off">
    </div>
  </header>

  <!-- Continue Your Search (journey predictions) — hidden for now -->
  <!-- <section id="continue-search-section" class="continue-search-section" style="display: none;"></section> -->

  <!-- Main Content with Tabs -->
  <main class="main-content">
    <div id="tab-bar" class="tab-bar"></div>
    <div id="destination-grid" class="destination-grid"></div>
  </main>

  <!-- Detail Modal -->
  <div id="detail-modal" class="modal-overlay">
    <div class="modal-content"></div>
  </div>

  <!-- IntentTracker plugin (IIFE build — exposes window.IntentTracker) -->
  <script src="lib/dist/intent-tracker.js?v=9"></script>
  <!-- Shared profile-state helpers (window.IntentTrackerExt) — drives the
       click-count ranking inside the tripType tabs. -->
  <script src="js/utils/profile-state.js"></script>

  <script type="module" src="js/app2.js?v=6"></script>
  <script src="js/ui/for-you-chip.js"></script>
</body>
</html>
