<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wanderlust — Discover Your Next Adventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/cards.css">
  <link rel="stylesheet" href="styles/modal.css">
  <link rel="stylesheet" href="styles/recommendations.css">
  <link rel="stylesheet" href="styles/tabs.css">
  <link rel="stylesheet" href="styles/navbar.css">
  <link rel="stylesheet" href="styles/for-you.css">
  <link rel="stylesheet" href="styles/cart.css">
  <link rel="stylesheet" href="styles/booking.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <a href="index.html" class="nav-brand">Wanderlust</a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="vacations.html">Vacations</a>
      <a href="hotels.html">Hotels</a>
      <a href="resorts.html">Resorts</a>
      <a href="dining.html">Dining</a>
    </div>
    <!-- Cart icon (additive; renders empty/hidden until items are queued) -->
    <div class="cart-nav-wrap site-nav-cart" id="cart-nav-wrap">
      <button type="button" class="cart-nav-link" id="cart-nav-toggle" aria-label="Cart, empty" aria-expanded="false" aria-haspopup="true">
        <svg class="lucide-icon" xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
        <span class="cart-notification-bubble" id="cart-badge" hidden aria-label="Items in cart">
          <span class="cart-badge-count">0</span>
        </span>
      </button>
      <div class="cart-flyout" id="cart-flyout" hidden role="dialog" aria-label="Cart preview">
        <div class="cart-flyout-header">
          <span class="cart-flyout-label">In your cart</span>
        </div>
        <div class="cart-flyout-body" id="cart-flyout-body"></div>
        <div class="cart-flyout-actions">
          <a href="cart.html" class="btn btn-primary cart-flyout-view">View Cart</a>
          <button type="button" class="btn btn-secondary cart-flyout-clear" id="cart-flyout-clear">Clear &amp; Start Over</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section with Search -->
  <header class="hero">
    <h1>Where will you go next?</h1>
    <p>Explore destinations around the world</p>
    <div class="search-container">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search destinations, regions, or trip types..." autocomplete="off">
    </div>
  </header>

  <!-- Continue Your Search (journey predictions) — hidden for now -->
  <!-- <section id="continue-search-section" class="continue-search-section" style="display: none;"></section> -->

  <!-- Main Content with Tabs -->
  <main class="main-content">
    <div id="tab-bar" class="tab-bar"></div>
    <div id="destination-grid" class="destination-grid"></div>
  </main>

  <!-- Detail Modal -->
  <div id="detail-modal" class="modal-overlay">
    <div class="modal-content"></div>
  </div>

  <!-- Multi-step booking flow overlay (hidden until openBookingFlow is called) -->
  <div id="booking-overlay"></div>

  <!-- IntentTracker plugin (IIFE build — exposes window.IntentTracker) -->
  <script src="lib/dist/intent-tracker.js?v=9"></script>
  <!-- Shared profile-state helpers (window.IntentTrackerExt) — drives the
       click-count ranking inside the tripType tabs. -->
  <script src="js/utils/profile-state.js"></script>

  <script type="module" src="js/app2.js?v=8"></script>
  <script src="js/ui/for-you-chip.js"></script>

  <!--
    Cart + booking wiring. Additive on top of the IntentTracker plugin —
    we don't touch app2.js. Booking events are forwarded to /api/ingest
    using the plugin's userId/sessionId so the Journey Observatory
    (journey-dashboard.html) sees the full cart + checkout path as part
    of the same user's journey.
  -->
  <script type="module">
    import { destinations } from './js/data/destinations.js';
    import { initCartIcon, updateCartIcon } from './js/ui/cart-icon.js';
    import { initBookingFlow, openBookingFlow, resumeAbandonedBooking, bookingStore } from './js/ui/booking-flow.js';

    const destMap = new Map(destinations.map(d => [d.id, d]));

    // Reuse the IntentTracker plugin's userId so the journey dashboard
    // attributes booking events to the same user that's browsing. Falls
    // back to a stable cart-only ID if the plugin hasn't initialized yet.
    function getUserId() {
      const profile = window.__intentTracker?.getProfile?.();
      return profile?.userId
        || (window.__cartUserId ||= 'user-cart-' + Math.random().toString(36).slice(2, 10));
    }
    function getSessionId() {
      return window.__cartSessionId ||= 'session-' + Date.now();
    }

    function emitBookingEvent(event) {
      const body = JSON.stringify({
        userId: getUserId(),
        sessionId: getSessionId(),
        pageUrl: location.pathname,
        ts: Date.now(),
        signals: [event],
        profile: null,
      });
      try {
        if (navigator.sendBeacon) {
          navigator.sendBeacon('/api/ingest', new Blob([body], { type: 'application/json' }));
          return;
        }
      } catch (_) { /* fall through */ }
      fetch('/api/ingest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body, keepalive: true,
      }).catch(() => {});
    }

    initBookingFlow({
      onEvent: emitBookingEvent,
      onCartChange: updateCartIcon,
      onComplete: () => updateCartIcon(),
      onAbandon: () => updateCartIcon(),
    });
    initCartIcon({});

    // "Live Journey" navbar chip — close the loop from product to analytics:
    // click takes you to the Journey Observatory pre-filtered to your live
    // session. Sits next to the For You chip; gold to match dashboard accent.
    (function mountJourneyChip() {
      const navLinks = document.querySelector('.site-nav .nav-links');
      if (!navLinks || navLinks.querySelector('.journey-nav-link')) return;
      const style = document.createElement('style');
      style.textContent = [
        // Selectors are scoped under .site-nav .nav-links so they out-specify
        // the existing `.site-nav .nav-links a:hover` rule (which would
        // otherwise blast the gold gradient with a transparent-white hover
        // background and make the chip turn dark/unreadable).
        '.site-nav .nav-links a.journey-nav-link {',
        '  display: inline-flex; align-items: center; gap: 0.4rem;',
        '  padding: 0.4rem 0.9rem; margin-left: 0.25rem; border-radius: 999px;',
        '  background: linear-gradient(135deg, #ffd66b, #f0b929);',
        '  color: #1a1300; font-family: "DM Sans", sans-serif;',
        '  font-weight: 600; font-size: 0.9rem; text-decoration: none;',
        '  box-shadow: 0 2px 8px rgba(255,214,107,0.35);',
        '  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;',
        '}',
        '.site-nav .nav-links a.journey-nav-link:hover {',
        '  color: #1a1300;',
        '  background: linear-gradient(135deg, #ffe28a, #f5c43e);',
        '  transform: translateY(-1px);',
        '  box-shadow: 0 4px 12px rgba(255,214,107,0.55);',
        '}',
        '.journey-nav-link .live-dot {',
        '  width: 7px; height: 7px; border-radius: 50%;',
        '  background: #d4361a;',
        '  animation: journey-live-pulse 1.4s ease-in-out infinite;',
        '}',
        '@keyframes journey-live-pulse {',
        '  0%, 100% { box-shadow: 0 0 0 0 rgba(212,54,26,0.55); }',
        '  50%      { box-shadow: 0 0 0 5px rgba(212,54,26,0); }',
        '}',
      ].join('\n');
      document.head.appendChild(style);
      const chip = document.createElement('a');
      chip.className = 'journey-nav-link';
      chip.href = '/journey-dashboard.html';
      chip.title = 'See your live behavioral journey + AI-suggested experiments';
      const dot = document.createElement('span');
      dot.className = 'live-dot';
      dot.setAttribute('aria-hidden', 'true');
      chip.appendChild(dot);
      chip.appendChild(document.createTextNode('Live Journey'));
      navLinks.appendChild(chip);
    })();

    // Event-delegated "Book This Trip" handler on the existing detail modal.
    // We piggyback on data-dest-id added by detail-modal.js — no extra coupling.
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action="book"][data-dest-id]');
      if (!btn) return;
      const dest = destMap.get(btn.dataset.destId);
      if (!dest) return;
      const abandoned = bookingStore.getAbandoned().find(a => a.destinationId === dest.id);
      if (abandoned) resumeAbandonedBooking(dest, abandoned);
      else openBookingFlow(dest);
    });
  </script>
</body>
</html>
